name: CI-CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test

    # 👇 ADD FROM HERE
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERMOUNI12 }}
        password: ${{ secrets.Mouni@1905 }}

    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKERMOUNI12 }}/ci-cd-lab:latest .

    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKERMOUNI12 }}/ci-cd-lab:latest
